<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astra AI - Modular Desktop Companion</title>
  <link rel="stylesheet" href="./styles/variables.css">
  <link rel="stylesheet" href="./styles/layout.css">
  <link rel="stylesheet" href="./styles/components.css">
  <link rel="stylesheet" href="./styles/animations.css">
</head>
<body>
  <div id="app-container">
    <!-- Navigation Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <div class="logo-icon">A</div>
        <div class="logo-text">ASTRA OS</div>
      </div>
      
      <nav id="navigation">
        <button class="nav-button active" data-target="chat-panel">
          <span class="nav-icon">💬</span> Chat
        </button>
        <button class="nav-button" data-target="memory-panel">
          <span class="nav-icon">🧠</span> Memory
        </button>
        <button class="nav-button" data-target="planner-panel">
          <span class="nav-icon">📊</span> Activity
        </button>
        <button class="nav-button" data-target="tools-panel">
          <span class="nav-icon">🛠️</span> Installed Tools
        </button>
        <button class="nav-button" data-target="logs-panel">
          <span class="nav-icon">📝</span> Logs
        </button>
        <button class="nav-button" data-target="settings-panel">
          <span class="nav-icon">⚙️</span> Settings
        </button>
      </nav>

      <div id="sidebar-footer">
        <div class="status-badge badge-blue" id="system-status-indicator">
          <span class="status-dot"></span>
          Astra Online
        </div>
      </div>
    </aside>

    <!-- Main Content Workspace -->
    <main id="main-workspace">
      <!-- Top header bar representing OS state -->
      <header id="workspace-header">
        <div>
          <h2 id="active-panel-title">Chat</h2>
        </div>
        <div id="os-telemetry-container">
          <div class="telemetry-widget">
            <span class="telemetry-label">CPU</span>
            <span class="telemetry-val" id="cpu-telemetry">12%</span>
          </div>
          <div class="telemetry-widget">
            <span class="telemetry-label">MEM</span>
            <span class="telemetry-val" id="mem-telemetry">4.2 GB</span>
          </div>
          <div class="status-badge badge-blue" id="active-model-pill">Gemini 3.5 Flash</div>
          <div class="status-badge badge-green" id="safety-level-pill">Safety: Standard</div>
        </div>
      </header>

      <div id="workspace-content">
        <!-- Chat Area (with nested conversation history) -->
        <div id="chat-panel" class="view-panel active"></div>

        <!-- Memory Page -->
        <div id="memory-panel" class="view-panel"></div>

        <!-- Activity Page (Task Planner) -->
        <div id="planner-panel" class="view-panel"></div>

        <!-- Installed Tools Page -->
        <div id="tools-panel" class="view-panel"></div>

        <!-- Logs Page -->
        <div id="logs-panel" class="view-panel"></div>

        <!-- Settings Page -->
        <div id="settings-panel" class="view-panel"></div>

        <!-- Embedded Interactive Tools Containers (opened from Installed Tools) -->
        <div id="embedded-tool-modal" class="modal-overlay" style="display:none;">
          <div class="modal-container glass-card">
            <div class="modal-header">
              <h3 id="modal-tool-title">Tool Execution</h3>
              <button id="modal-close-btn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body" id="modal-tool-body">
              <!-- Dynamically populated terminal, browser, vision, voice screens -->
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
